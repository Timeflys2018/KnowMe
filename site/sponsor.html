<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>支持知我 KnowMe</title>
  <meta name="description" content="支持知我 KnowMe 独立开发。赞赏是自愿支持，不解锁功能、不绑定 Pro 权益。">
  <meta property="og:title" content="支持知我 KnowMe">
  <meta property="og:description" content="本地优先 AI 第二大脑 · 自愿支持开发者">
  <meta property="og:url" content="https://useknowme.com/sponsor">
  <meta property="og:image" content="https://useknowme.com/assets/og-image.jpg">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #1f2937;
      --muted: #64748b;
      --border: #e2e8f0;
      --soft: #f8fafc;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.14), transparent 36rem),
        linear-gradient(135deg, #fff7ed 0%, #eef2ff 100%);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 520px;
      padding: 2.25rem;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px -32px rgba(15, 23, 42, 0.35);
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: block;
      margin: 0 auto 1.25rem;
    }
    h1 {
      font-size: clamp(1.55rem, 5vw, 2rem);
      letter-spacing: -0.03em;
      margin-bottom: 0.65rem;
    }
    .sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
      margin-bottom: 1.5rem;
    }
    .qr {
      width: 196px;
      margin: 0 auto 1rem;
      padding: 10px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .qr img {
      display: block;
      width: 174px;
      height: 174px;
      object-fit: cover;
      border-radius: 10px;
    }
    .caption {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.35rem;
    }
    .actions {
      display: grid;
      gap: 0.75rem;
      margin: 1.35rem 0;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn-primary {
      color: white;
      background: var(--primary);
      box-shadow: 0 10px 22px -12px var(--primary);
    }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-secondary {
      color: var(--text);
      background: var(--soft);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--primary); transform: translateY(-1px); }
    .note {
      margin-top: 1.35rem;
      padding: 1rem;
      text-align: left;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #92400e;
      font-size: 0.88rem;
      line-height: 1.65;
    }
    .footer {
      margin-top: 1.35rem;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .footer a { color: var(--primary-dark); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/icon-256.png" alt="知我 KnowMe">
    <h1>支持知我 KnowMe</h1>
    <p class="sub">知我是独立开发者长期维护的本地优先 AI 第二大脑。如果它对你有价值,欢迎通过公众号赞赏或邮件表达支持。</p>

    <div class="qr">
      <img src="assets/wechat-mp-qr.jpg" alt="微信公众号 Time留痕 二维码">
    </div>
    <p class="caption">扫码关注公众号「Time留痕」。支持文章发布后,可在文章文末使用微信赞赏。</p>

    <div class="actions">
      <a class="btn btn-primary" href="mailto:contact@useknowme.com?subject=支持知我%20KnowMe&body=你好，我想支持知我 KnowMe 的持续开发。">📬 邮件联系支持</a>
      <a class="btn btn-secondary" href="mailto:contact@useknowme.com?subject=KnowMe%20Pro%20等待名单&body=你好，我希望 Pro 发布时得到通知。">⏳ 加入 Pro 等待名单</a>
    </div>

    <div class="note">
      <strong>赞赏不解锁任何功能。</strong><br>
      赞赏是自愿支持,不构成购买,不绑定 Pro 权益、早鸟名额或折扣。公测期所有用户都享有完整体验;正式购买通道会单独公布。
    </div>

    <p class="footer"><a href="/">返回首页</a> · <a href="https://docs.useknowme.com">阅读文档</a></p>
  </main>
</body>
</html>
